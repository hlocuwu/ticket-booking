networks:
  ticket-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

services:
  # ---------------------------------------
  # Databases & Caches
  # ---------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: ticket_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ticket_admin
      POSTGRES_PASSWORD: secure_password_123
      POSTGRES_DB: ticket_db 
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ticket-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticket_admin -d ticket_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ticket_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning 
    networks:
      - ticket-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------
  # Microservices
  # ---------------------------------------
  inventory:
    build:
      context: ./services/inventory
      dockerfile: Dockerfile
    container_name: ticket_inventory_service
    restart: on-failure
    ports:
      - "8081:8080"
    environment:
      # This matches the container_name of our Postgres service
      - DB_HOST=ticket_postgres 
    networks:
      - ticket-network
    depends_on:
      postgres:
        condition: service_healthy

  waitingroom:
    build:
      context: ./services/waitingroom
      dockerfile: Dockerfile
    container_name: ticket_waitingroom_service
    restart: on-failure
    ports:
      - "8082:8080"
    environment:
      # This matches the container_name of our Redis service
      - REDIS_HOST=ticket_redis
      - PORT=8080
    networks:
      - ticket-network
    depends_on:
      redis:
        condition: service_healthy

  booking:
    build:
      context: ./services/booking
      dockerfile: Dockerfile
    container_name: ticket_booking_service
    restart: on-failure
    ports:
      - "8083:8080"
    environment:
      - INVENTORY_URL=http://ticket_inventory_service:8080
      - WAITINGROOM_URL=http://ticket_waitingroom_service:8080
      - AUTH_URL=http://ticket_auth_service:8080 # NEW: Add the Auth internal URL
      - PORT=8080
    networks:
      - ticket-network
    depends_on:
      - inventory
      - waitingroom
      - auth                             # NEW: Add the dependency

  event:
    build:
      context: ./services/event
      dockerfile: Dockerfile
    container_name: ticket_event_service
    restart: on-failure
    ports:
      - "8084:8080"
    environment:
      - DB_HOST=ticket_postgres
      - PORT=8080
    networks:
      - ticket-network
    depends_on:
      postgres:
        condition: service_healthy

  notification:
    build:
      context: ./services/notification
      dockerfile: Dockerfile
    container_name: ticket_notification_service
    restart: on-failure
    ports:
      - "8086:8086"
    environment:
      - PORT=8086
      - SMTP_SERVER=${SMTP_SERVER:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SENDER_EMAIL=${SENDER_EMAIL:-no-reply@ticket-booking.local}
    networks:
      - ticket-network

  auth:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: ticket_auth_service
    restart: on-failure
    ports:
      - "8085:8080"
    environment:
      - DB_HOST=ticket_postgres # NEW: Tell Auth where the DB is
      - PORT=8080
    networks:
      - ticket-network
    depends_on:
      postgres:                 # NEW: Wait for the DB to be ready
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ticket_frontend
    restart: always
    ports:
      - "3000:80"
    networks:
      - ticket-network
    depends_on:
      - auth
      - event
      - waitingroom
      - booking

